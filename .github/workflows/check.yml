on:
  push:
    paths:
      - "**.nix"
      - "**.lock"
      - ".github/workflows/check.yml"

jobs:
  check:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3
      - run: nix flake check --show-trace --accept-flake-config --extra-experimental-features flakes --extra-experimental-features nix-command --impure
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
